name: Wait for idle runner

on:
  push:
    branches:
      - main
      - master
  pull_request:
    paths:
      - "**wait-for-idle-runner**"
      - "package.json"
      - "package-lock.json"
      - "node_modules/**"

permissions: {}

jobs:
  syntax:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Check scripts
        run: node --check wait-for-idle-runner/main.mts
