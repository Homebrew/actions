name: Cache Homebrew Prefix

on:
  pull_request:
    paths:
      - "**cache-homebrew-prefix**"
      - "package.json"
      - "package-lock.json"
      - "node_modules/**"

permissions: {}

jobs:
  cache-homebrew-prefix-install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Homebrew
        uses: ./setup-homebrew/

      - name: Ensure empty Homebrew formulae
        run: |
          formulae="$(brew list --formula || true)"
          if [[ -n "${formulae}" ]]; then
            brew uninstall --force --ignore-dependencies ${formulae}
          fi
        shell: /bin/bash -euo pipefail {0}

      - name: Install pre-existing formula
        run: brew install --formula hello
        shell: /bin/bash -euo pipefail {0}

      - name: Cache Homebrew prefix with uninstall
        id: cache-homebrew-prefix-install
        uses: ./cache-homebrew-prefix/
        with:
          install: wget jq
          uninstall: true
          workflow-key: test

      - name: Verify cache metadata
        run: |
          . /etc/os-release
          expected_prefix="${ID}-${VERSION_ID}-$(uname -m)-test"
          test "${CACHE_PREFIX}" = "${expected_prefix}"
          test -n "${CACHE_KEY}"
        shell: /bin/bash -euo pipefail {0}
        env:
          CACHE_PREFIX: ${{ steps.cache-homebrew-prefix-install.outputs.cache-prefix }}
          CACHE_KEY: ${{ steps.cache-homebrew-prefix-install.outputs.cache-key }}

      - name: Verify installs
        run: |
          ! brew list --formula hello >/dev/null 2>&1
          brew list --versions wget
          brew list --versions jq
        shell: /bin/bash -euo pipefail {0}

  cache-homebrew-prefix-brewfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Homebrew
        uses: ./setup-homebrew/

      - name: Ensure empty Homebrew formulae
        run: |
          formulae="$(brew list --formula || true)"
          if [[ -n "${formulae}" ]]; then
            brew uninstall --force --ignore-dependencies ${formulae}
          fi
        shell: /bin/bash -euo pipefail {0}

      - name: Install pre-existing formula
        run: brew install --formula hello
        shell: /bin/bash -euo pipefail {0}

      - name: Create Brewfile
        run: |
          cat > Brewfile <<'EOF'
          brew "wget"
          brew "jq"
          EOF
        shell: /bin/bash -euo pipefail {0}

      - name: Cache Homebrew prefix from Brewfile with uninstall
        id: cache-homebrew-prefix-brewfile
        uses: ./cache-homebrew-prefix/
        with:
          brewfile: true
          uninstall: true
          workflow-key: brewfile-test

      - name: Verify cache metadata
        run: |
          . /etc/os-release
          expected_prefix="${ID}-${VERSION_ID}-$(uname -m)-brewfile-test"
          test "${CACHE_PREFIX}" = "${expected_prefix}"
          test -n "${CACHE_KEY}"
        shell: /bin/bash -euo pipefail {0}
        env:
          CACHE_PREFIX: ${{ steps.cache-homebrew-prefix-brewfile.outputs.cache-prefix }}
          CACHE_KEY: ${{ steps.cache-homebrew-prefix-brewfile.outputs.cache-key }}

      - name: Verify installs
        run: |
          ! brew list --formula hello >/dev/null 2>&1
          brew list --versions wget
          brew list --versions jq
        shell: /bin/bash -euo pipefail {0}
